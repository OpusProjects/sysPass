<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Front controller
        RewriteEngine On

        # Pass the Authorization header through mod_rewrite to PHP
        RewriteCond %{HTTP:Authorization} .
        RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

        # REST API: route /api/v1/* to api.php
        RewriteRule ^api/v1(/.*)?$ api.php [QSA,L]

        # Everything else that is not a real file/dir goes to index.php
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    # Application internals are served through PHP (the "file" route), never
    # directly. Deny web access to source, config (DB creds + crypto keys),
    # schemas, tests and composer's vendor tree.
    <DirectoryMatch "^/var/www/html/(config|var|src|schemas|tests|vendor)/">
        Require all denied
    </DirectoryMatch>

    # Swagger UI API documentation
    Alias /api/docs /var/www/html/public/api

    <Directory /var/www/html/public/api>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
