<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Front controller: route anything that is not a real file/dir to index.php
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    # Application internals are served through PHP (the "file" route), never
    # directly. Deny web access to source, config (DB creds + crypto keys),
    # schemas, tests and composer's vendor tree.
    <DirectoryMatch "^/var/www/html/(app|lib|schemas|tests|vendor)/">
        Require all denied
    </DirectoryMatch>

    # Exception: the bundled theme CSS references fonts/images by their on-disk path
    # (e.g. url('app/modules/web/themes/material-blue/css/Roboto_400.woff2')). Allow those
    # static asset file types under the themes tree; PHP views (.inc) stay denied.
    <DirectoryMatch "^/var/www/html/app/modules/web/themes/[^/]+/(css|images|js|icons)/">
        <FilesMatch "\.(woff2?|ttf|eot|otf|svg|png|jpe?g|gif|ico)$">
            Require all granted
        </FilesMatch>
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
