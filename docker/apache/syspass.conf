<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Front controller: route anything that is not a real file/dir to index.php
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    # Application internals are served through PHP (the "file" route), never
    # directly. Deny web access to source, config (DB creds + crypto keys),
    # schemas, tests and composer's vendor tree.
    <DirectoryMatch "^/var/www/html/(app|lib|schemas|tests|vendor)/">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
