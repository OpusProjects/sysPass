; Development-oriented PHP settings for sysPass.

; The web entry point (index.php) uses the autoloaded SP\ classes before it loads
; lib/Base.php, so the Composer autoloader must be prepended to every request.
auto_prepend_file = /var/www/html/vendor/autoload.php

memory_limit = 256M
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 120

; Surface errors while we work on the upgrade. Tighten for any real deployment.
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

date.timezone = UTC

; sysPass stores sessions server-side; keep them reasonably long for dev.
session.gc_maxlifetime = 86400
