name: sysPass CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_mysql, gd, ldap, gettext, zip, intl, mbstring
          coverage: none
          ini-values: zend.assertions=1

      - name: Install iproute2 and locales
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends iproute2 locales
          for l in en_US es_ES ca_ES de_DE hu_HU fr_FR pl_PL ru_RU nl_NL pt_BR it_IT ja_JP; do
            sudo localedef -i "$l" -f UTF-8 "$l.UTF-8" || true
          done

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit -c tests/phpunit.xml --group unitary --testsuite core --no-coverage

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: syspass
          MARIADB_DATABASE: syspass
          MARIADB_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_mysql, gd, ldap, gettext, zip, intl, mbstring
          coverage: none
          ini-values: zend.assertions=1

      - name: Install iproute2 and locales
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends iproute2 locales
          for l in en_US es_ES ca_ES de_DE hu_HU fr_FR pl_PL ru_RU nl_NL pt_BR it_IT ja_JP; do
            sudo localedef -i "$l" -f UTF-8 "$l.UTF-8" || true
          done

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Load schema
        run: mysql -h 127.0.0.1 -P 3306 -u root -psyspass syspass < schemas/dbstructure.sql

      - name: Run integration tests
        env:
          DB_SERVER: 127.0.0.1
          DB_NAME: syspass
          DB_USER: root
          DB_PASS: syspass
          DB_PORT: 3306
        run: vendor/bin/phpunit -c tests/phpunit.xml --group integration --no-coverage

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_mysql, gd, ldap, gettext, zip, intl, mbstring
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Create .env for PHPStan bootstrap
        run: echo "DEBUG=false" > .env

      - name: PHPStan
        run: vendor/bin/phpstan analyse --level 6 --error-format=github src

      - name: PHPCS
        run: composer phpcs

      - name: Verify vendored npm assets are current
        run: npm run vendor && git diff --exit-code public/vendor/

  build-image:
    name: Build image
    needs: [unit, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Release
    needs: build-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Extract changelog section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v start="## [$version]" '
            substr($0, 1, length(start)) == start { flag = 1; next }
            flag && substr($0, 1, 4) == "## [" { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
